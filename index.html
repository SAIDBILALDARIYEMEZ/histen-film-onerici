<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruh Haline Göre Otomatik Film Önerici</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<script src="movies_data.js"></script>
<style>
  :root {
    --bg: #0b0e17;
    --surface: #141a29;
    --surface-2: #1b2338;
    --border: #2a324a;
    --gold: #e3b341;
    --gold-dim: #a9832f;
    --coral: #ff6b5f;
    --text: #f5f3ee;
    --text-dim: #9aa1b4;
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; align-items: center;
    padding: 28px 16px 60px;
  }
  .wrap { width: 100%; max-width: 680px; }

  /* ---- Marquee header ---- */
  .marquee { text-align: center; margin-bottom: 28px; }
  .bulbs {
    height: 6px; margin: 0 auto 14px; width: 100%; max-width: 420px;
    background-image: radial-gradient(circle, var(--gold) 2.2px, transparent 2.6px);
    background-size: 18px 100%; opacity: 0.75;
  }
  .marquee h1 {
    font-family: 'Bebas Neue', sans-serif; font-weight: 400;
    font-size: clamp(2rem, 6vw, 3.1rem); letter-spacing: 0.03em;
    margin: 0; color: var(--gold); line-height: 1.05;
  }
  .marquee p { color: var(--text-dim); margin: 8px 0 0; font-size: 0.92rem; }

  /* ---- Controls ---- */
  #setup {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px; margin-bottom: 20px;
  }
  #setup .field label {
    display: block; font-size: 0.72rem; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 6px;
  }
  #setup select, #setup input[type=range] { width: 100%; }
  #setup select {
    padding: 9px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text); font-family: inherit;
    font-size: 0.9rem; appearance: none;
  }
  #setup select:focus, button:focus-visible {
    outline: 2px solid var(--gold); outline-offset: 2px;
  }
  input[type=range] { accent-color: var(--gold); }

  /* ---- Camera panel ---- */
  .film-strip {
    height: 12px; background: #05070c;
    background-image: radial-gradient(circle, var(--surface) 3.5px, transparent 4px);
    background-size: 22px 100%;
  }
  #video_wrap { border-radius: 0; overflow: hidden; border: 1px solid var(--border); border-top: none; border-bottom: none; }
  video { width: 100%; display: block; background: #000; }
  .camera-card { border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
  #status {
    font-size: 0.82rem; color: var(--text-dim); padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 14px 14px; display: flex; align-items: center; gap: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
  .dot.live { background: var(--coral); animation: pulse 1.6s infinite ease-in-out; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  #start_btn {
    display: block; width: 100%; margin: 16px 0 24px; padding: 13px;
    border-radius: 10px; border: none; cursor: pointer;
    background: var(--gold); color: #201705; font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 0.98rem; letter-spacing: 0.02em;
  }
  #start_btn:disabled { background: var(--surface-2); color: var(--text-dim); cursor: default; }
  #start_btn:hover:not(:disabled) { background: #f0c363; }

  /* ---- Ticket-stub recommendation card ---- */
  .ticket {
    display: flex; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; min-height: 118px; margin-bottom: 32px;
  }
  .ticket .mood {
    flex: 0 0 100px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 12px 8px; text-align: center; gap: 4px;
  }
  .ticket .mood .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); }
  .ticket .mood .value { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--gold); letter-spacing: 0.02em; }
  .perf {
    flex: 0 0 0; position: relative; border-left: 2px dashed var(--border);
  }
  .perf::before, .perf::after {
    content: ""; position: absolute; left: -9px; width: 16px; height: 16px;
    background: var(--bg); border-radius: 50%;
  }
  .perf::before { top: -8px; }
  .perf::after { bottom: -8px; }
  .ticket .film { flex: 1; padding: 16px 20px; min-width: 0; }
  .ticket .film .title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--text); letter-spacing: 0.01em; line-height: 1.15; }
  .ticket .film .meta { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }
  .ticket .film .meta strong { color: var(--gold); }
  .ticket .film a {
    display: inline-block; margin-top: 10px; color: #201705; background: var(--gold);
    text-decoration: none; font-size: 0.82rem; font-weight: 600; padding: 6px 12px; border-radius: 7px;
  }
  .ticket .empty { padding: 24px 20px; color: var(--text-dim); font-size: 0.9rem; }

  /* ---- History ---- */
  .history-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
  .history-head h2 { font-family: 'Bebas Neue', sans-serif; font-weight: 400; font-size: 1.3rem; color: var(--gold); margin: 0; letter-spacing: 0.02em; }
  .history-head span { font-size: 0.75rem; color: var(--text-dim); }
  #history_box { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; }
  .hist-row {
    display: flex; align-items: center; gap: 10px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 9px; padding: 9px 12px; font-size: 0.85rem;
  }
  .hist-row time { color: var(--text-dim); font-variant-numeric: tabular-nums; font-size: 0.78rem; flex-shrink: 0; }
  .hist-row .mood-tag { color: var(--gold); font-weight: 600; flex-shrink: 0; }
  .hist-row a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--gold-dim); }
  .hist-row .rating { margin-left: auto; color: var(--text-dim); flex-shrink: 0; }
  #history_box .empty { color: var(--text-dim); font-size: 0.85rem; padding: 4px 0; }

  @media (max-width: 480px) {
    #setup { grid-template-columns: 1fr; }
    .ticket .mood { flex-basis: 78px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="marquee">
    <div class="bulbs" aria-hidden="true"></div>
    <h1>Ruh Haline Göre<br>Film Önerici</h1>
    <p>Kameran ifadeni okur, sana o an uyan bir film seçer.</p>
  </div>

  <div id="setup">
    <div class="field">
      <label for="mood_goal">Ruh hali hedefi</label>
      <select id="mood_goal">
        <option value="auto">Otomatik (yüz ifademe göre)</option>
        <option value="happier">Daha mutlu hissetmek istiyorum</option>
        <option value="reinforce">Ruh halimi pekiştir</option>
      </select>
    </div>
    <div class="field">
      <label for="genre">Tür</label>
      <select id="genre"><option value="">Tümü</option></select>
    </div>
    <div class="field">
      <label for="min_rating">Minimum puan: <span id="min_rating_val">0</span></label>
      <input type="range" id="min_rating" min="0" max="9" step="0.5" value="0">
    </div>
    <div class="field">
      <label for="sort_by">Sıralama</label>
      <select id="sort_by">
        <option value="votes">Popülerlik</option>
        <option value="rating">Puan (yüksek → düşük)</option>
        <option value="year_desc">Yeni → eski</option>
        <option value="year_asc">Eski → yeni</option>
      </select>
    </div>
  </div>

  <div class="camera-card">
    <div class="film-strip" aria-hidden="true"></div>
    <div id="video_wrap"><video id="video" autoplay muted playsinline></video></div>
    <div class="film-strip" aria-hidden="true"></div>
  </div>
  <div id="status"><span class="dot" id="status_dot"></span><span id="status_text">Modeller yükleniyor...</span></div>

  <button id="start_btn">Kamerayı başlat</button>

  <div class="ticket" id="ticket">
    <div class="empty">Kamerayı başlatınca öneri burada görünecek.</div>
  </div>

  <div class="history-head">
    <h2>Öneri geçmişi</h2>
    <span>bu oturuma özel, sayfa yenilenince sıfırlanır</span>
  </div>
  <div id="history_box"><div class="empty">Henüz kayıt yok.</div></div>

</div>

<script>
// -----------------------------------------------------------------
// Veri ve ayarlar — MOVIES_DATA, movies_data.js dosyasından geliyor
// (~4450 gerçek IMDb filmi: title, year, genres, rating, votes, imdb_id)
// -----------------------------------------------------------------
const EMOTION_TO_CATEGORY = {
  happy: "neseli", surprised: "neseli",
  neutral: "dusundurucu",
  sad: "huzunlu",
  fearful: "gergin", disgusted: "gergin",
  angry: "enerjik",
};

// Ekranda göstermek için Türkçe çeviri (iç mantıkta İngilizce anahtarlar kalıyor)
const EMOTION_TR = {
  happy: "mutlu", surprised: "şaşkın", neutral: "nötr",
  sad: "üzgün", fearful: "korku", disgusted: "tiksinme", angry: "kızgın",
};
function emotionTr(label) { return EMOTION_TR[label] || label; }

const MOOD_TO_GENRES = {
  neseli: ["Comedy", "Animation", "Family", "Musical", "Music"],
  huzunlu: ["Drama", "Romance"],
  enerjik: ["Action", "Adventure", "Sport"],
  gergin: ["Thriller", "Horror", "Crime", "Mystery"],
  dusundurucu: ["Sci-Fi", "Mystery", "Biography", "History", "Documentary", "War"],
};

const ALL_GENRES = [...new Set(MOVIES_DATA.flatMap(m => m.genres))].sort();

const SORT_FUNCS = {
  votes: (a, b) => b.votes - a.votes,
  rating: (a, b) => b.rating - a.rating,
  year_desc: (a, b) => (b.year || 0) - (a.year || 0),
  year_asc: (a, b) => (a.year || 0) - (b.year || 0),
};

// -----------------------------------------------------------------
// DOM
// -----------------------------------------------------------------
const video = document.getElementById("video");
const statusText = document.getElementById("status_text");
const statusDot = document.getElementById("status_dot");
const ticket = document.getElementById("ticket");
const historyBox = document.getElementById("history_box");
const startBtn = document.getElementById("start_btn");
const genreSelect = document.getElementById("genre");
const minRatingInput = document.getElementById("min_rating");
const minRatingVal = document.getElementById("min_rating_val");
const moodGoalSelect = document.getElementById("mood_goal");
const sortBySelect = document.getElementById("sort_by");

ALL_GENRES.forEach((name) => {
  const opt = document.createElement("option");
  opt.value = name; opt.textContent = name;
  genreSelect.appendChild(opt);
});
minRatingInput.addEventListener("input", () => { minRatingVal.textContent = minRatingInput.value; });

let modelsReady = false;
let lastCategoryKey = null;
const pools = {};   // cacheKey -> { pool: [...], shownTitles: Set, current: movie }
let history = [];

const MODEL_URL = "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model";

async function loadModels() {
  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
    faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
  ]);
  modelsReady = true;
  statusText.textContent = "Modeller hazır. Kamerayı başlatabilirsin.";
}
loadModels().catch((err) => { statusText.textContent = "Model yüklenemedi: " + err.message; });

async function startCamera() {
  if (!modelsReady) { statusText.textContent = "Modeller henüz hazır değil, birkaç saniye bekle."; return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
    video.srcObject = stream;
    startBtn.disabled = true;
    startBtn.textContent = "Kamera açık";
    statusDot.classList.add("live");
    statusText.textContent = "İfade takip ediliyor...";
    setInterval(tick, 2000);
  } catch (err) {
    statusText.textContent = "Kameraya erişilemedi: " + err.message;
  }
}
startBtn.addEventListener("click", startCamera);

async function tick() {
  if (video.readyState < 2) return;
  const detection = await faceapi
    .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
    .withFaceLandmarks()
    .withFaceExpressions();

  if (!detection) { statusText.textContent = "Yüz bulunamadı, kameraya bak."; return; }

  const expressions = detection.expressions;
  let bestLabel = null, bestScore = -1;
  Object.keys(expressions).forEach((key) => {
    if (expressions[key] > bestScore) { bestScore = expressions[key]; bestLabel = key; }
  });

  statusText.textContent = `Tespit edilen ifade: ${emotionTr(bestLabel)} (%${Math.round(bestScore * 100)})`;
  recommend(bestLabel, bestScore);
}

function resolveTargetCategory(detectedLabel) {
  const detectedCategory = EMOTION_TO_CATEGORY[detectedLabel] || "dusundurucu";
  const goal = moodGoalSelect.value;
  if (goal === "reinforce") return detectedCategory;
  if (goal === "happier") return "neseli";
  return ["huzunlu", "gergin", "enerjik"].includes(detectedCategory) ? "neseli" : detectedCategory;
}

function buildPool(targetCategory, genreName, minRating, sortBy) {
  const wanted = genreName ? [genreName] : MOOD_TO_GENRES[targetCategory];
  let pool = MOVIES_DATA.filter((m) => m.genres.some((g) => wanted.includes(g)));
  if (minRating > 0) pool = pool.filter((m) => m.rating >= minRating);
  pool = [...pool].sort(SORT_FUNCS[sortBy] || SORT_FUNCS.votes);
  return pool.slice(0, 40);
}

function recommend(detectedLabel, score) {
  const targetCategory = resolveTargetCategory(detectedLabel);
  const genreName = genreSelect.value;
  const minRating = parseFloat(minRatingInput.value);
  const sortBy = sortBySelect.value;
  const cacheKey = `${targetCategory}|${genreName}|${minRating}|${sortBy}`;

  let entry = pools[cacheKey];
  if (!entry) {
    const pool = buildPool(targetCategory, genreName, minRating, sortBy);
    if (pool.length === 0) {
      ticket.innerHTML = `<div class="empty">Bu filtrelerle sonuç yok, filtreleri gevşet.</div>`;
      return;
    }
    entry = { pool, shownTitles: new Set(), current: null };
    pools[cacheKey] = entry;
  }

  if (cacheKey !== lastCategoryKey) {
    let unseen = entry.pool.filter((m) => !entry.shownTitles.has(m.title));
    if (unseen.length === 0) { entry.shownTitles.clear(); unseen = entry.pool; }
    const movie = unseen[Math.floor(Math.random() * unseen.length)];
    entry.shownTitles.add(movie.title);
    entry.current = movie;
    lastCategoryKey = cacheKey;

    const imdbUrl = `https://www.imdb.com/title/${movie.imdb_id}/`;
    history.push({
      zaman: new Date().toLocaleTimeString("tr-TR"),
      ifade: detectedLabel, film: movie.title, yil: movie.year,
      puan: movie.rating, imdbUrl,
    });
    renderHistory();
  }

  renderTicket(detectedLabel, score, entry.current);
}

function renderTicket(detectedLabel, score, movie) {
  const imdbUrl = `https://www.imdb.com/title/${movie.imdb_id}/`;
  ticket.innerHTML = `
    <div class="mood">
      <span class="label">Şu an</span>
      <span class="value">${emotionTr(detectedLabel)}</span>
      <span class="label">%${Math.round(score * 100)}</span>
    </div>
    <div class="perf"></div>
    <div class="film">
      <div class="title">${movie.title} <span style="color:var(--text-dim); font-family:'Inter',sans-serif; font-size:1rem;">(${movie.year || "?"})</span></div>
      <div class="meta"><strong>★ ${movie.rating}</strong> — ${movie.genres.join(", ")}</div>
      <a href="${imdbUrl}" target="_blank" rel="noopener">IMDb'de aç</a>
    </div>`;
}

function renderHistory() {
  if (history.length === 0) { historyBox.innerHTML = `<div class="empty">Henüz kayıt yok.</div>`; return; }
  const rows = history.slice(-12).reverse().map((h) => `
    <div class="hist-row">
      <time>${h.zaman}</time>
      <span class="mood-tag">${emotionTr(h.ifade)}</span>
      <a href="${h.imdbUrl}" target="_blank" rel="noopener">${h.film} (${h.yil || "?"})</a>
      <span class="rating">★ ${h.puan}</span>
    </div>`);
  historyBox.innerHTML = rows.join("");
}
</script>
</body>
</html>
